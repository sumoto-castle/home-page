<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXPO 2025 内線電話シミュレーター</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:"Segoe UI",sans-serif;

    background:
        radial-gradient(circle at top,
        #39a6ff 0%,
        #0057b8 45%,
        #001f4d 100%);
}

.phone{
    width:380px;
    padding:24px;
    border-radius:24px;

    background:rgba(255,255,255,.12);
    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.2);

    box-shadow:
        0 20px 50px rgba(0,0,0,.35);
}

.logo{
    text-align:center;
    color:#fff;
    font-size:28px;
    font-weight:700;
    letter-spacing:3px;
}

.subtitle{
    text-align:center;
    color:#dcefff;
    font-size:13px;
    margin-top:5px;
    margin-bottom:20px;
}

.display{
    background:#fff;
    border-radius:16px;
    padding:16px;
    margin-bottom:18px;
}

.number{
    font-size:28px;
    color:#003366;
    font-weight:bold;
    min-height:34px;
}

.status{
    color:#666;
    margin-top:8px;
    font-size:14px;
    min-height:20px;
}

.keypad{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.btn{
    height:65px;
    border:none;
    border-radius:14px;

    background:rgba(255,255,255,.15);

    color:white;
    font-size:24px;
    cursor:pointer;

    transition:.2s;
}

.btn:hover{
    transform:scale(1.05);
    background:rgba(255,255,255,.25);
}

.actions{
    display:flex;
    gap:10px;
    margin-top:16px;
}

.call{
    flex:1;
    height:58px;
    border:none;
    border-radius:14px;
    cursor:pointer;

    color:white;
    font-size:20px;
    font-weight:bold;

    background:
    linear-gradient(
        135deg,
        #ff4d6d,
        #ff8c00
    );
}

.clear{
    flex:1;
    height:58px;
    border:none;
    border-radius:14px;
    cursor:pointer;

    color:white;
    font-size:20px;
    font-weight:bold;

    background:
    linear-gradient(
        135deg,
        #5f6c7b,
        #39424e
    );
}

.log{
    margin-top:18px;
    background:rgba(255,255,255,.08);
    border-radius:14px;
    padding:14px;
    color:white;
    font-size:13px;
    min-height:85px;
}

.blink{
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{
        opacity:.3;
    }
}
</style>
</head>
<body>

<div class="phone">

    <div class="logo">
        EXPO 2025
    </div>

    <div class="subtitle">
        公益社団法人 2025年日本国際博覧会協会<br>
        内線電話シミュレーター
    </div>

    <div class="display">

        <div class="number" id="number"></div>

        <div class="status" id="status">
            内線番号を入力してください
        </div>

    </div>

    <div class="keypad" id="keypad"></div>

    <div class="actions">
        <button class="call" onclick="callExtension()">📞 発信</button>
        <button class="clear" onclick="clearNumber()">✖ 消去</button>
    </div>

    <div class="log" id="log">
        発信履歴はありません
    </div>

</div>

<script>

const departments = [
"総務部",
"広報部",
"人事部",
"経理部",
"会場運営部",
"来場者サービス部",
"国際連携部",
"交通対策室",
"警備統括室",
"夢洲統括本部",
"EXPOホール",
"ボランティアセンター",
"メディアセンター",
"落とし物センター",
"パビリオン調整室"
];

const display =
document.getElementById("number");

const status =
document.getElementById("status");

const log =
document.getElementById("log");

let number = "";

const keypad =
document.getElementById("keypad");

[
"1","2","3",
"4","5","6",
"7","8","9",
"*","0","#"
].forEach(key=>{

    const btn =
    document.createElement("button");

    btn.className="btn";

    btn.textContent=key;

    btn.onclick=()=>{

        number += key;

        display.textContent = number;

        try{

            const ctx =
            new(window.AudioContext||window.webkitAudioContext)();

            const osc =
            ctx.createOscillator();

            const gain =
            ctx.createGain();

            osc.frequency.value=700;

            osc.connect(gain);
            gain.connect(ctx.destination);

            gain.gain.value=0.03;

            osc.start();

            osc.stop(
                ctx.currentTime + 0.05
            );

        }catch(e){}

    };

    keypad.appendChild(btn);

});

function clearNumber(){

    number="";

    display.textContent="";

    status.textContent=
    "内線番号を入力してください";

}

function callExtension(){

    if(number===""){

        status.textContent =
        "番号を入力してください";

        return;

    }

    status.textContent =
    "発信中...";

    status.classList.add("blink");

    const callSound = new Audio("call.mp3");

    callSound.loop = true;

    callSound.addEventListener("loadedmetadata", () => {

        callSound.currentTime = 13;

        callSound.play();

    });

    setTimeout(()=>{

        status.classList.remove("blink");

        const r = Math.random();

        let result = "";

        if(r < 0.55){

            const dept =
            departments[
                Math.floor(
                    Math.random() *
                    departments.length
                )
            ];

            result =
            dept + " に接続しました";

        }
        else if(r < 0.80){

            result =
            "担当者は席を外しております";

        }
        else if(r < 0.95){

            result =
            "ただいま話し中です";

        }
        else{

            result =
            "この番号は現在使われておりません";

        }

        callSound.pause();
        callSound.currentTime = 13;

        status.textContent =
        result;

        log.innerHTML =
        `
        発信番号：${number}<br>
        結果：${result}<br>
        時刻：${new Date().toLocaleTimeString("ja-JP")}
        `;

    },7000);

}

</script>

</body>
</html>
